<script>
// ── Supabase REST Client (no CDN, no Proxy, iOS Safari compatible) ──
var supabase=(function(){
  function createClient(url,key){
    var U=url.replace(/\/$/,'');
    function H(extra){
      var h={'apikey':key,'Authorization':'Bearer '+key,'Content-Type':'application/json','Prefer':'return=representation'};
      if(extra)Object.keys(extra).forEach(function(k){h[k]=extra[k];});
      return h;
    }
    // Core fetch wrapper
    function req(method,table,filters,body,single){
      var q=U+'/rest/v1/'+table;
      var p=filters?filters.filter(Boolean):[];
      if(p.length)q+='?'+p.join('&');
      var opts={method:method,headers:H(single?{'Accept':'application/vnd.pgrst.object+json'}:{})};
      if(method==='DELETE')opts.headers['Prefer']='';
      if(body!==undefined&&body!==null)opts.body=JSON.stringify(body);
      return fetch(q,opts).then(function(r){
        if(r.status===204)return{data:null,error:null};
        return r.json().then(function(b){
          if(!r.ok)return{data:null,error:{message:(b&&(b.message||b.hint||b.details))||('HTTP '+r.status),code:r.status}};
          return{data:b,error:null};
        });
      }).catch(function(e){return{data:null,error:{message:e.message}};});
    }
    // Builder — returns plain object (no Proxy)
    function from(table){
      var _sel='*',_flt=[],_ord=null,_lim=null,_single=false,_method='GET',_body=null;
      var b={};
      b.select=function(s){_sel=s;_method='GET';return b;};
      b.eq=function(c,v){_flt.push(c+'=eq.'+encodeURIComponent(String(v)));return b;};
      b.neq=function(c,v){_flt.push(c+'=neq.'+encodeURIComponent(String(v)));return b;};
      b.ilike=function(c,v){_flt.push(c+'=ilike.*'+encodeURIComponent(v)+'*');return b;};
      b.order=function(c,o){_ord=c+'.'+(o&&o.ascending===false?'desc':'asc');return b;};
      b.limit=function(n){_lim=n;return b;};
      b.single=function(){_single=true;return b;};
      b.insert=function(d){_method='POST';_body=d;return b;};
      b.upsert=function(d){_method='POST';_body=d;_flt.push('on_conflict=id');return b;};
      b.update=function(d){_method='PATCH';_body=d;return b;};
      b.delete=function(){_method='DELETE';return b;};
      b.then=function(res,rej){return b._go().then(res,rej);};
      b.catch=function(rej){return b._go().catch(rej);};
      b._go=function(){
        var p=[];
        if(_method==='GET')p.push('select='+encodeURIComponent(_sel));
        _flt.forEach(function(f){p.push(f);});
        if(_ord)p.push('order='+_ord);
        if(_lim)p.push('limit='+_lim);
        var q=U+'/rest/v1/'+table;
        if(p.length)q+='?'+p.join('&');
        var hdrs={'apikey':key,'Authorization':'Bearer '+key,'Content-Type':'application/json'};
        if(_method!=='DELETE')hdrs['Prefer']='return=representation';
        if(_single)hdrs['Accept']='application/vnd.pgrst.object+json';
        var opts={method:_method,headers:hdrs};
        if(_body!==null&&_body!==undefined)opts.body=JSON.stringify(_body);
        return fetch(q,opts).then(function(r){
          if(r.status===204)return{data:null,error:null};
          return r.json().then(function(d){
            if(!r.ok)return{data:_single?null:[],error:{message:(d&&(d.message||d.hint||d.details))||('HTTP '+r.status),code:r.status}};
            return{data:d,error:null};
          });
        }).catch(function(e){return{data:_single?null:[],error:{message:e.message}};});
      };
      return b;
    }
    return{
      from:from,
      channel:function(){return{on:function(){return{subscribe:function(){}};}};}
    };
  }
  return{createClient:createClient};

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;
  --card:#1c1c1c;--card2:#222;
  --gold:#d4a017;--gold2:#f0c040;--gold3:#8a6800;
  --goldbg:rgba(212,160,23,0.08);--goldborder:rgba(212,160,23,0.22);
  --txt:#f0e8d0;--txt2:#9a8860;--txt3:#5a4a30;--muted:#5a4a30;
  --ok:#22c55e;--err:#ef4444;--warn:#f59e0b;--info:#3b82f6;

}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--txt);display:flex;width:100vw;height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--goldborder);border-radius:4px;}

@keyframes load{0%{width:0}70%{width:80%}100%{width:100%}}
@keyframes pgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@keyframes mp{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}

.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}

.modal{background:var(--bg2);border:1px solid var(--goldborder);border-radius:17px;padding:22px;width:510px;max-height:88vh;overflow-y:auto;transform:translateY(18px) scale(.97);transition:all .25s;box-shadow:0 20px 60px rgba(212,160,23,0.08);}
.ov.show .modal{transform:translateY(0) scale(1);}
.modal h2{font-size:15px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:7px;color:var(--gold);}
.mc{float:left;background:none;border:none;color:var(--txt3);font-size:15px;cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:7px;transition:all .2s;}

.mac{display:flex;gap:7px;margin-top:14px;}
.mac .bp,.mac .bs{margin-top:0;}
.cdlg{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);z-index:2000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.cdlg.show{opacity:1;pointer-events:all;}
.cbox{background:var(--bg2);border:1px solid rgba(239,68,68,.25);border-radius:15px;padding:22px;width:330px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.cbox h3{font-size:14px;font-weight:700;margin-bottom:7px;}

.cbtns{display:flex;gap:7px;}
.cbn{flex:1;padding:10px;border-radius:9px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .2s;}
.cbn.yes{background:var(--err);color:#fff;}
.cbn.no{background:var(--bg3);color:var(--txt);border:1px solid var(--border);}
.odr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.odr:last-child{border-bottom:none;}
.odl{font-size:11px;color:var(--txt3);}
.odv{font-size:12px;font-weight:600;}
.ni2{display:flex;align-items:center;gap:10px;padding:11px 13px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer;transition:background .12s;}

.rg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.rc{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;cursor:pointer;transition:all .2s;}
.rc:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,160,23,0.1);}

.rc p{font-size:10px;color:var(--txt3);margin-bottom:11px;}
.rdl{display:inline-flex;align-items:center;gap:4px;background:var(--goldbg);color:var(--gold);padding:5px 11px;border-radius:7px;font-size:10px;font-weight:700;border:1px solid var(--goldborder);}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--bg2);border:1px solid var(--gold);color:var(--txt);padding:10px 17px;border-radius:12px;font-size:13px;font-weight:600;z-index:9999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);display:flex;align-items:center;gap:7px;box-shadow:0 10px 40px rgba(212,160,23,0.15);max-width:350px;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.err{border-color:var(--err);}
.toast.warn{border-color:var(--warn);}
.toast.ok{border-color:var(--ok);}
.empty{padding:32px;text-align:center;color:var(--txt3);}
.empty div{font-size:34px;margin-bottom:9px;opacity:.4;}
.empty p{font-size:12px;}
.skel{background:linear-gradient(90deg,rgba(212,160,23,.04) 25%,rgba(212,160,23,.08) 50%,rgba(212,160,23,.04) 75%);background-size:200% 100%;animation:sk 1.5s infinite;border-radius:7px;}
.branch-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:15px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.branch-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent);}
.branch-card:hover{border-color:var(--gold);transform:translateY(-2px);}
.bc-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.bc-ic{width:38px;height:38px;border-radius:10px;background:var(--goldbg);border:1px solid var(--goldborder);display:flex;align-items:center;justify-content:center;font-size:18px;}
.bc-name{font-size:13px;font-weight:700;}
.bc-city{font-size:10px;color:var(--txt3);}
.bc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px;}
.bs-item{text-align:center;padding:7px;background:var(--bg3);border-radius:8px;border:1px solid var(--border);}
.bs-val{font-family:'Tajawal',sans-serif;font-size:15px;font-weight:800;color:var(--gold);}
.bs-lbl{font-size:9px;color:var(--txt3);margin-top:2px;}
.bc-foot{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;}
.opt-label{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;font-weight:500;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:9px 12px;transition:all .18s;user-select:none;}
.opt-label:hover{background:var(--goldbg);border-color:var(--goldborder);}
.opt-label.checked{background:var(--goldbg);border-color:var(--gold);color:var(--gold);}
@media(max-width:1100px){.g2{grid-template-columns:1fr;}.g3{grid-template-columns:1fr 1fr;}.sg{grid-template-columns:1fr 1fr;}.rg{grid-template-columns:1fr 1fr;}}
@media(max-width:900px){#sidebar{display:none;}#main{width:100vw;}.g2,.g3,.g22{grid-template-columns:1fr;}.sg{grid-template-columns:1fr 1fr;}.rg{grid-template-columns:1fr 1fr;}.sw{display:none;}#content{padding:10px 9px;}.modal{width:94vw;padding:17px;}.fg2{grid-template-columns:1fr;}.topbar{padding:0 10px;}}
